<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tallsnap</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="app-header">
        <div class="brand-lockup">
          <div class="brand-badge" aria-hidden="true">
            <img src="icon.png" class="brand-mark" alt="" />
          </div>
          <div class="brand-copy">
            <p class="eyebrow" data-i18n="popup_eyebrow"></p>
            <h1>Tallsnap</h1>
            <p class="hero-copy" data-i18n="popup_hero_copy"></p>
          </div>
        </div>
        <div class="header-actions">
          <button class="settings-link" id="open-settings" type="button" data-i18n="popup_settings"></button>
        </div>
      </header>

      <section class="shortcut-card">
        <p class="shortcut-line" id="shortcut-line"></p>
        <p class="shortcut-copy" id="shortcut-default-line"></p>
      </section>

      <section class="panel workflow-panel">
        <div class="section-heading">
          <span class="section-step">1</span>
          <div>
            <p class="section-title" data-i18n="popup_mode_label"></p>
          </div>
        </div>
        <div class="mode-stack">
          <button class="mode-card" id="mode-full-page" type="button" data-capture-mode="fullPage">
            <span class="mode-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="4.5" y="5.5" width="15" height="13" rx="2.5"></rect>
                <path d="M8 9h8"></path>
                <path d="M8 13h5"></path>
              </svg>
            </span>
            <span class="mode-body">
              <span class="mode-title" data-i18n="popup_whole_page"></span>
              <span class="mode-copy" data-i18n="popup_whole_page_hint"></span>
            </span>
          </button>
          <button class="mode-card" id="mode-visible" type="button" data-capture-mode="visibleArea">
            <span class="mode-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7 4.5H4.5V7"></path>
                <path d="M17 4.5h2.5V7"></path>
                <path d="M7 19.5H4.5V17"></path>
                <path d="M17 19.5h2.5V17"></path>
                <rect x="7.5" y="7.5" width="9" height="9" rx="2"></rect>
              </svg>
            </span>
            <span class="mode-body">
              <span class="mode-title" data-i18n="popup_what_i_see"></span>
              <span class="mode-copy" data-i18n="popup_what_i_see_hint"></span>
            </span>
          </button>
          <button class="mode-card" id="mode-element" type="button" data-capture-mode="element">
            <span class="mode-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7 4.5v14l3.8-3 2.6 4 2.3-1.3-2.6-4.2H18L7 4.5Z"></path>
              </svg>
            </span>
            <span class="mode-body">
              <span class="mode-title" data-i18n="popup_element"></span>
              <span class="mode-copy" data-i18n="popup_element_hint"></span>
            </span>
          </button>
        </div>
      </section>

      <section class="panel workflow-panel">
        <div class="section-heading">
          <span class="section-step">2</span>
          <div>
            <p class="section-title" data-i18n="popup_actions_label"></p>
          </div>
        </div>
        <div class="action-row">
          <button class="action-button action-primary" type="button" data-output-target="clipboard" data-i18n="popup_copy"></button>
          <button class="action-button action-secondary" type="button" data-output-target="download" data-i18n="popup_save"></button>
        </div>
      </section>

      <section class="panel utility-panel">
        <label class="cleanup-toggle">
          <input id="cleanup-enabled" type="checkbox" />
          <span class="cleanup-switch" aria-hidden="true"></span>
          <span class="cleanup-copy">
            <strong data-i18n="popup_cleanup_label"></strong>
            <small data-i18n="popup_cleanup_copy"></small>
          </span>
        </label>

        <details class="advanced-panel">
          <summary>
            <span data-i18n="popup_more_options"></span>
          </summary>

          <p class="advanced-copy" data-i18n="popup_advanced_note"></p>

          <div class="field-grid">
            <label class="field">
              <span data-i18n="popup_download_format"></span>
              <select id="output-format">
                <option value="png" data-i18n="format_png"></option>
                <option value="jpg" data-i18n="format_jpg"></option>
                <option value="pdf" data-i18n="format_pdf"></option>
              </select>
            </label>

            <label class="field">
              <span data-i18n="popup_filename"></span>
              <select id="filename-preset">
                <option value="title-date" data-i18n="filename_title_date"></option>
                <option value="domain-date" data-i18n="filename_domain_date"></option>
                <option value="timestamp" data-i18n="filename_timestamp"></option>
              </select>
            </label>
          </div>
        </details>
      </section>

      <footer class="popup-footer">
        <button class="coffee-button" id="support-link" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 10h8.5a1 1 0 0 1 1 1v3.5A4.5 4.5 0 0 1 12 19H10.5A3.5 3.5 0 0 1 7 15.5V11a1 1 0 0 1 1-1Z"></path>
            <path d="M16.5 11h1a2.25 2.25 0 1 1 0 4.5h-1"></path>
            <path d="M9 21h7"></path>
            <path d="M10 6c0-1.1.8-1.7.8-2.8"></path>
            <path d="M13.5 6c0-1 .8-1.6.8-2.7"></path>
          </svg>
          <span data-i18n="popup_support"></span>
        </button>
        <p class="status-message" id="status-message" aria-live="polite"></p>
      </footer>
    </main>

    <script src="shared.js"></script>
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
